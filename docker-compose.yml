services:
  # Optional local MongoDB — only started with: docker compose --profile local up
  mongo:
    profiles: ["local"]
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/genisis}
      PORT: 3001
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      NODE_ENV: ${NODE_ENV:-development}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./backend/uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
        required: false
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  mongo_data:
  backend_node_modules:
  frontend_node_modules:
  frontend_next:
